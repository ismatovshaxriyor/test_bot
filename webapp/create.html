        }
        [data-theme='dark'] .option-btn { border-color: #4b5563; color: #e5e7eb; }

            border-color: rgba(100,116,139,0.45);
            background: rgba(30,41,59,0.4);
        }

        .question-row {
            animation: fadeIn 0.12s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .count-box {
            border: 1px solid #cbd5e1;
            border-radius: 12px;

        }

            border-color: #475569;
        }

        button, .option-btn, .counter-btn {

        function resizeArray(arr, size) {
            const next = arr.slice(0, size);
            while (next.length < size) {
                next.push('');
            }
            return next;

        function refreshCounts() {
            document.getElementById('closed-count-display').textContent = closedCount;
            document.getElementById('closed-caption').textContent = `${closedCount} ta`;

        function syncSimpleState() {
            closedAnswers = resizeArray(closedAnswers, closedCount);
            refreshCounts();

        function changeClosedCount(delta) {
            const next = Math.max(1, Math.min(MAX_TOTAL_QUESTIONS, closedCount + delta));
            if (next === closedCount) return;
            closedCount = next;
            selectionHaptic();
            renderAll();
        }

        // --- GLOBAL KEYBOARD SUPPORT ---
        document.addEventListener('keydown', (e) => {
            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
            if (['input', 'textarea'].includes(activeTag)) return;

            const key = e.key.toLowerCase();
            const validKeys = ['a', 'b', 'c', 'd'];

            if (validKeys.includes(key) && closedCount > 0) {
                const nextEmpty = closedAnswers.findIndex(ans => !ans);
                if (nextEmpty !== -1) {
                    closedAnswers[nextEmpty] = key;
                    selectionHaptic();
                    renderSimpleClosedQuestions();
                    updateMainButton();
                    e.preventDefault();

                    const nextEmptyBtn = document.querySelector('.question-row button:not(.selected)');
                    if (nextEmptyBtn) {
                        nextEmptyBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }

            if (key === 'backspace' || key === 'delete') {
                if (closedCount > 0) {
                    const lastFilled = closedAnswers.findLastIndex(a => a);
                    if (lastFilled !== -1) {
                        closedAnswers[lastFilled] = '';
                        selectionHaptic();
                        renderSimpleClosedQuestions();
                        updateMainButton();
                        e.preventDefault();
                    }
                }
            }
        });

        // MathLive virtual klaviaturasini tashqariga bosib yopish (mobil)
        function hideMathKeyboard() {
            try {
                const vk = window.mathVirtualKeyboard;
                if (vk && vk.visible) vk.hide();
            } catch (e) {}
            const active = document.activeElement;
            if (active && active.tagName && active.tagName.toLowerCase() === 'math-field') {
                try { active.blur(); } catch (e) {}
            }
        }
        function tapIsOnMathKeyboard(ev) {
            const vk = window.mathVirtualKeyboard;
            if (vk && vk.boundingRect && vk.boundingRect.width > 0) {
                const r = vk.boundingRect;
                if (ev.clientX >= r.left - 4 && ev.clientX <= r.right + 4 &&
                    ev.clientY >= r.top - 4 && ev.clientY <= r.bottom + 4) {
                    return true;
                }
            }
            return !!(ev.target && ev.target.closest && ev.target.closest('.ML__keyboard'));
        }
        document.addEventListener('pointerdown', (ev) => {
            if (ev.target && ev.target.closest && ev.target.closest('math-field')) return;
            const vk = window.mathVirtualKeyboard;
            if (!vk || !vk.visible) return;
            if (tapIsOnMathKeyboard(ev)) return;
            hideMathKeyboard();
        });

        renderAll();
