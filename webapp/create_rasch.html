<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test yaratish</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/mathlive@0.110.0"></script>
    <script type="module">
    {% raw %}
        window.addEventListener('DOMContentLoaded', () => {
            const vk = window.mathVirtualKeyboard;
            if (!vk) return;
            vk.layouts = [{
                label: 'Math',
                rows: [
                    [
                        {label:'1',insert:'1'},{label:'2',insert:'2'},{label:'3',insert:'3'},
                        {label:'4',insert:'4'},{label:'5',insert:'5'},{label:'6',insert:'6'},
                        {label:'7',insert:'7'},{label:'8',insert:'8'},{label:'9',insert:'9'},
                        {label:'0',insert:'0'}
                    ],
                    [
                        {latex:'\\pi',insert:'\\pi'},{latex:'e',insert:'e'},
                        {label:'a',insert:'a'},{label:'b',insert:'b'},{label:'c',insert:'c'},
                        {label:'x',insert:'x'},{label:'y',insert:'y'},{label:'z',insert:'z'},
                        {label:'.',insert:'.'}
                    ],
                    [
                        {label:'(',insert:'('},{label:')',insert:')'},
                        {latex:'\\frac{\\square}{\\square}',insert:'\\frac{#0}{#0}'},
                        {latex:'\\sqrt{\\square}',insert:'\\sqrt{#0}'},
                        {latex:'\\square^{\\square}',insert:'#0^{#0}'},
                        {latex:'\\square^2',insert:'#0^{2}'},
                        {latex:'\\square^3',insert:'#0^{3}'},
                        {latex:'\\sqrt[3]{\\square}',insert:'\\sqrt[3]{#0}'},
                        {latex:'\\sqrt[n]{\\square}',insert:'\\sqrt[#0]{#0}'}
                    ],
                    [
                        {label:'+',insert:'+'},{label:'−',insert:'-'},
                        {latex:'\\sin\\square',insert:'\\sin(#0)'},
                        {latex:'\\cos\\square',insert:'\\cos(#0)'},
                        {latex:'\\tan\\square',insert:'\\tan(#0)'},
                        {latex:'\\cot\\square',insert:'\\cot(#0)'}
                    ],
                    [
                        {latex:'\\arcsin\\square',insert:'\\arcsin(#0)'},
                        {latex:'\\arccos\\square',insert:'\\arccos(#0)'},
                        {latex:'\\arctan\\square',insert:'\\arctan(#0)'},
                        {latex:'\\text{arcctg}\\square',insert:'\\text{arcctg}(#0)'}
                    ],
                    [
                        {latex:'\\ln\\square',insert:'\\ln(#0)'},
                        {latex:'\\log\\square',insert:'\\log(#0)'},
                        {latex:'\\log_{\\square}\\square',insert:'\\log_{#0}(#0)'},
                        {latex:'\\exp\\square',insert:'\\exp(#0)'}
                    ]
                ]
            }];
        });
    {% endraw %}
    </script>

    <style>
        body {
            background-color: var(--tg-theme-bg-color, #f3f4f6);
            color: var(--tg-theme-text-color, #1f2937);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .option-btn {
            border: 1px solid #d1d5db;
            color: #374151;
            transition: all 0.15s ease;
            cursor: pointer;
            user-select: none;
        }
        [data-theme='dark'] .option-btn { border-color: #4b5563; color: #e5e7eb; }
        .option-btn.selected {
            background-color: var(--tg-theme-button-color, #3b82f6);
            color: var(--tg-theme-button-text-color, #fff);
            border-color: var(--tg-theme-button-color, #3b82f6);
            transform: scale(1.05);
            font-weight: 700;
        }
        .glass-panel {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        [data-theme='dark'] .glass-panel {
            background: rgba(31,41,55,0.88);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mode-card {
            border: 2px solid #e5e7eb;
            transition: all 0.2s;
            cursor: pointer;
        }
        .mode-card.active {
            border-color: var(--tg-theme-button-color, #3b82f6);
            background: rgba(59,130,246,0.08);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
        }
        [data-theme='dark'] .mode-card { border-color: #4b5563; }
        [data-theme='dark'] .mode-card.active { background: rgba(59,130,246,0.15); border-color: #60a5fa; }

        .counter-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #d1d5db;
            transition: all 0.15s;
            user-select: none;
        }
        .counter-btn:active { transform: scale(0.92); }
        [data-theme='dark'] .counter-btn { border-color: #4b5563; color: #e5e7eb; }

        .section-card {
            border: 1px solid rgba(148,163,184,0.35);
            background: rgba(255,255,255,0.5);
        }
        [data-theme='dark'] .section-card {
            border-color: rgba(100,116,139,0.45);
            background: rgba(30,41,59,0.4);
        }

        .question-row {
            animation: fadeIn 0.12s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .open-field {
            width: 100%;
            min-height: 46px;
            border: 1.5px solid #d1d5db;
            border-radius: 10px;
            padding: 8px 10px;
            background: #081a33;
            color: #ffffff;
            transition: border-color 0.15s;
        }
        .open-field::placeholder {
            color: rgba(255, 255, 255, 0.72);
        }
        .open-field:focus-within {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139,92,246,0.15);
        }
        [data-theme='dark'] .open-field {
            border-color: #4b5563;
            background: #081a33;
            color: #ffffff;
        }
        .open-field::part(virtual-keyboard-toggle) {
            margin: 0;
            padding-inline: 6px;
        }
        .open-field::part(menu-toggle) {
            display: none;
        }
        .open2-pair {
            display: grid;
            grid-template-columns: 1fr;
            row-gap: 0;
            column-gap: 8px;
        }
        @media (min-width: 640px) {
            .open2-pair {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                row-gap: 6px;
            }
        }
        @media (max-width: 480px) {
            .open-field::part(virtual-keyboard-toggle) {
                padding-inline: 3px;
                transform: translateX(4px);
                margin-right: -6px;
            }
        }

        .count-box {
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 10px;
        }
        [data-theme='dark'] .count-box {
            border-color: #475569;
        }

        /* Mobil: tap kechikishi/zoom yo'q, kulrang highlightni olib tashlash */
        button, .option-btn, .counter-btn, input, math-field {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen p-4 pb-28">
    <div class="glass-panel max-w-md mx-auto p-5 rounded-3xl shadow-lg mt-2 relative overflow-hidden">
        <div class="absolute -top-12 -right-12 w-28 h-28 bg-green-400 rounded-full opacity-10 blur-2xl"></div>
        <div class="absolute -bottom-12 -left-12 w-36 h-36 bg-blue-500 rounded-full opacity-10 blur-2xl"></div>

        <h1 class="text-2xl font-extrabold text-center mb-5 tracking-tight">📝 Yangi test yaratish</h1>





        <div id="rasch-config">
            <div class="section-card rounded-xl p-3 mb-4">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="font-bold text-sm">1-32 savollar (A-D)</h2>
                    <span class="text-xs opacity-70">32 ta</span>
                </div>
                <div id="rasch-closed4-container" class="space-y-2"></div>
            </div>

            <div class="section-card rounded-xl p-3 mb-4">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="font-bold text-sm">33-35 savollar (A-F)</h2>
                    <span class="text-xs opacity-70">3 ta</span>
                </div>
                <div id="rasch-closed6-container" class="space-y-2"></div>
            </div>

            <div class="section-card rounded-xl p-3">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="font-bold text-sm">36-45 savollar (a/b juft ochiq)</h2>
                    <span class="text-xs opacity-70">10 ta savol, 20 ta javob</span>
                </div>
                <div id="rasch-open2-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const tgApp = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
        const IS_TELEGRAM_WEBAPP = Boolean(
            tgApp &&
            typeof tgApp.sendData === 'function'
        );
        const WebApp = tgApp || {
            expand() {},
            ready() {},
            close() {},
            sendData() {},
            onEvent() {},
            offEvent() {},
            showAlert(message) { alert(message); },
            themeParams: {},
            initDataUnsafe: {},
            colorScheme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
            HapticFeedback: {
                selectionChanged() {},
                notificationOccurred() {}
            },
            MainButton: {
                text: '',
                color: '#8b5cf6',
                show() {},
                hide() {},
                showProgress() {},
                hideProgress() {},
                onClick() {}
            }
        };
        WebApp.expand();
        WebApp.ready();

        if (WebApp.colorScheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.classList.add('dark');
        }

        const MAX_TOTAL_QUESTIONS = 300;
        const RASCH_CLOSED4_COUNT = 32;
        const RASCH_CLOSED6_COUNT = 3;
        const RASCH_OPEN2_COUNT = 10;
        const RASCH_TOTAL_QUESTIONS = 45;



        let raschClosed4Answers = new Array(RASCH_CLOSED4_COUNT).fill('');
        let raschClosed6Answers = new Array(RASCH_CLOSED6_COUNT).fill('');
        let raschOpen2Answers = Array.from({ length: RASCH_OPEN2_COUNT }, () => ({ a: '', b: '' }));

        function selectionHaptic() {
            if (WebApp.HapticFeedback && WebApp.HapticFeedback.selectionChanged) {
                WebApp.HapticFeedback.selectionChanged();
            }
        }

        function notifyHaptic(type) {
            if (WebApp.HapticFeedback && WebApp.HapticFeedback.notificationOccurred) {
                WebApp.HapticFeedback.notificationOccurred(type);
            }
        }



        function renderOptionRow(container, questionNum, options, selectedValue, onSelect) {
            const isSixOptions = options.length === 6;
            const row = document.createElement('div');
            row.className = `question-row flex items-center ${isSixOptions ? 'gap-1.5' : 'gap-2'} p-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800/30 transition`;

            const num = document.createElement('span');
            num.className = `font-bold ${isSixOptions ? 'w-8' : 'w-10'} text-sm flex-shrink-0`;
            num.textContent = `${questionNum}.`;
            row.appendChild(num);

            const optsDiv = document.createElement('div');
            optsDiv.className = isSixOptions
                ? 'flex flex-1 gap-1 justify-end items-center flex-nowrap'
                : 'flex flex-1 gap-1.5 justify-end flex-wrap';

            options.forEach((opt) => {
                const btn = document.createElement('button');
                const value = opt.toLowerCase();
                const sizeClass = isSixOptions ? 'w-8 h-8 text-xs' : 'w-10 h-10 text-sm';
                btn.className = `option-btn ${sizeClass} rounded-lg flex items-center justify-center font-medium focus:outline-none active:scale-95 shadow-sm ${selectedValue === value ? 'selected' : ''}`;
                btn.textContent = opt;
                btn.onclick = () => onSelect(value);
                optsDiv.appendChild(btn);
            });

            row.appendChild(optsDiv);
            container.appendChild(row);
        }

        function readFieldValue(field) {
            // math-field qiymatini xavfsiz o'qish (upgrade bo'lmagan bo'lsa ham)
            let val = '';
            if (field && typeof field.getValue === 'function') {
                try { val = field.getValue(); } catch (e) { val = field.value; }
            } else if (field && field.value !== undefined) {
                val = field.value;
            }
            return String(val || '').trim();
        }

        function createOpenField(value, placeholder, onInput) {
            const field = document.createElement('math-field');
            field.className = 'open-field';
            field.setAttribute('virtual-keyboard-mode', 'onfocus');
            field.setAttribute('smart-mode', 'true');
            field.setAttribute('placeholder', placeholder);
            field.value = value;
            field.setAttribute('value', value);

            const handleInput = () => { onInput(readFieldValue(field)); };
            ['input', 'change', 'focusout', 'blur', 'keyup'].forEach((ev) => {
                field.addEventListener(ev, handleInput);
            });
            // Mobil: fokuslanganda virtual klaviatura maydonni yopib qo'ymasligi uchun ko'rinishga suramiz
            field.addEventListener('focus', () => {
                setTimeout(() => {
                    try { field.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (e) {}
                }, 200);
            });
            return field;
        }

        function flushOpenFields() {
            // Yuborish/sanashdan oldin a/b ochiq maydonlarni to'g'ridan-to'g'ri DOM'dan o'qiymiz
            document.querySelectorAll('math-field[data-open-idx]').forEach((field) => {
                const idx = Number(field.dataset.openIdx);
                const part = field.dataset.openPart;
                if (Number.isInteger(idx) && idx >= 0 && idx < raschOpen2Answers.length &&
                    (part === 'a' || part === 'b')) {
                    raschOpen2Answers[idx][part] = readFieldValue(field);
                }
            });
        }



        function renderRaschClosed4Questions() {
            const container = document.getElementById('rasch-closed4-container');
            container.innerHTML = '';

            for (let i = 0; i < RASCH_CLOSED4_COUNT; i++) {
                renderOptionRow(
                    container,
                    i + 1,
                    ['A', 'B', 'C', 'D'],
                    raschClosed4Answers[i],
                    (value) => {
                        raschClosed4Answers[i] = value;
                        selectionHaptic();
                        renderRaschClosed4Questions();
                        updateMainButton();
                    }
                );
            }
        }

        function renderRaschClosed6Questions() {
            const container = document.getElementById('rasch-closed6-container');
            container.innerHTML = '';

            for (let i = 0; i < RASCH_CLOSED6_COUNT; i++) {
                renderOptionRow(
                    container,
                    33 + i,
                    ['A', 'B', 'C', 'D', 'E', 'F'],
                    raschClosed6Answers[i],
                    (value) => {
                        raschClosed6Answers[i] = value;
                        selectionHaptic();
                        renderRaschClosed6Questions();
                        updateMainButton();
                    }
                );
            }
        }

        function renderRaschOpen2Questions() {
            const container = document.getElementById('rasch-open2-container');
            container.innerHTML = '';

            for (let i = 0; i < RASCH_OPEN2_COUNT; i++) {
                const row = document.createElement('div');
                row.className = 'question-row p-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800/30 transition';

                const num = document.createElement('span');
                num.className = 'font-bold text-sm block mb-2';
                num.textContent = `${36 + i}.`;
                row.appendChild(num);

                const pairWrap = document.createElement('div');
                pairWrap.className = 'open2-pair';

                const partA = document.createElement('div');
                const fieldA = createOpenField(
                    raschOpen2Answers[i].a,
                    'a)',
                    (nextValue) => {
                        raschOpen2Answers[i].a = nextValue;
                        updateMainButton();
                    }
                );
                fieldA.dataset.openIdx = String(i);
                fieldA.dataset.openPart = 'a';
                partA.appendChild(fieldA);

                const partB = document.createElement('div');
                const fieldB = createOpenField(
                    raschOpen2Answers[i].b,
                    'b)',
                    (nextValue) => {
                        raschOpen2Answers[i].b = nextValue;
                        updateMainButton();
                    }
                );
                fieldB.dataset.openIdx = String(i);
                fieldB.dataset.openPart = 'b';
                partB.appendChild(fieldB);

                pairWrap.appendChild(partA);
                pairWrap.appendChild(partB);
                row.appendChild(pairWrap);
                container.appendChild(row);
            }
        }



        function countRaschAnswered() {
            const answeredClosed4 = raschClosed4Answers.filter((a) => a !== '').length;
            const answeredClosed6 = raschClosed6Answers.filter((a) => a !== '').length;
            const answeredOpen2 = raschOpen2Answers.filter((pair) => pair.a && pair.b).length;
            return answeredClosed4 + answeredClosed6 + answeredOpen2;
        }

        function updateMainButton() {
            const total = RASCH_TOTAL_QUESTIONS;

            flushOpenFields();
            const answered = countRaschAnswered();

            WebApp.MainButton.show();

            if (answered === total) {
                WebApp.MainButton.text = `TEST YARATISH ✅ (${total} savol)`;
                WebApp.MainButton.color = '#22c55e';
            } else {
                WebApp.MainButton.text = `${answered}/${total} belgilangan`;
                WebApp.MainButton.color = WebApp.themeParams.button_color || '#8b5cf6';
            }
        }

        function renderAll() {
            renderRaschClosed4Questions();
            renderRaschClosed6Questions();
            renderRaschOpen2Questions();
            updateMainButton();
        }

        function sendToBot(payloadObject) {
            if (!IS_TELEGRAM_WEBAPP) {
                WebApp.showAlert('Iltimos, sahifani Telegram bot ichidan oching.');
                notifyHaptic('warning');
                return;
            }

            const payload = JSON.stringify(payloadObject);

            // Telegram WebApp data limit (safety guard)
            if (payload.length > 3800) {
                WebApp.showAlert('Javoblar juda uzun bo\'lib ketdi. Savollar sonini yoki javob matnini qisqartiring.');
                notifyHaptic('warning');
                return;
            }

            try {
                if (WebApp.MainButton && WebApp.MainButton.showProgress) {
                    WebApp.MainButton.showProgress();
                }
                WebApp.sendData(payload);
                if (typeof WebApp.close === 'function') {
                    setTimeout(() => WebApp.close(), 450);
                }
            } catch (e) {
                if (WebApp.MainButton && WebApp.MainButton.hideProgress) {
                    WebApp.MainButton.hideProgress();
                }
                WebApp.showAlert('Yuborishda xatolik yuz berdi. Qayta urinib ko\'ring.');
                notifyHaptic('error');
            }
        }

        function handleMainButtonClick() {
            flushOpenFields();
            const unanswered = [];

            for (let i = 0; i < RASCH_CLOSED4_COUNT; i++) {
                if (!raschClosed4Answers[i]) {
                    unanswered.push(i + 1);
                }
            }
            for (let i = 0; i < RASCH_CLOSED6_COUNT; i++) {
                if (!raschClosed6Answers[i]) {
                    unanswered.push(33 + i);
                }
            }
            for (let i = 0; i < RASCH_OPEN2_COUNT; i++) {
                if (!raschOpen2Answers[i].a || !raschOpen2Answers[i].b) {
                    unanswered.push(36 + i);
                }
            }

            if (unanswered.length > 0) {
                const missing = unanswered.length > 6
                    ? `${unanswered.slice(0, 6).join(', ')} va yana ${unanswered.length - 6} ta`
                    : unanswered.join(', ');
                WebApp.showAlert(`Belgilanmagan savollar: ${missing}`);
                notifyHaptic('warning');
                return;
            }

            const questions = [];

            for (let i = 0; i < RASCH_CLOSED4_COUNT; i++) {
                questions.push({
                    num: i + 1,
                    type: 'closed4',
                    answer: String(raschClosed4Answers[i] || '').toLowerCase()
                });
            }

            for (let i = 0; i < RASCH_CLOSED6_COUNT; i++) {
                questions.push({
                    num: 33 + i,
                    type: 'closed6',
                    answer: String(raschClosed6Answers[i] || '').toLowerCase()
                });
            }

            for (let i = 0; i < RASCH_OPEN2_COUNT; i++) {
                questions.push({
                    num: 36 + i,
                    type: 'open2',
                    answer: {
                        a: String(raschOpen2Answers[i].a || '').trim(),
                        b: String(raschOpen2Answers[i].b || '').trim(),
                    }
                });
            }

            notifyHaptic('success');
            sendToBot({
                action: 'create_test',
                scoring_mode: 'rasch',
                answers_format: 'mixed',
                questions
            });
        }

        if (typeof WebApp.onEvent === 'function') {
            WebApp.onEvent('mainButtonClicked', handleMainButtonClick);
        } else if (WebApp.MainButton && typeof WebApp.MainButton.onClick === 'function') {
            WebApp.MainButton.onClick(handleMainButtonClick);
        }

        // --- GLOBAL KEYBOARD SUPPORT (A-F) ---
        document.addEventListener('keydown', (e) => {
            // Ignore if user is typing inside an input, textarea, or math-field
            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
            if (['input', 'textarea', 'math-field'].includes(activeTag)) {
                return;
            }

            const key = e.key.toLowerCase();
            const validClosed4 = ['a', 'b', 'c', 'd'];
            const validClosed6 = ['a', 'b', 'c', 'd', 'e', 'f'];

            let handled = false;

            // Avval 1-32 gacha бўш joyni qidiramiz
            const nextEmpty4 = raschClosed4Answers.findIndex(ans => !ans);
            if (nextEmpty4 !== -1 && validClosed4.includes(key)) {
                raschClosed4Answers[nextEmpty4] = key;
                handled = true;
                selectionHaptic();
                renderRaschClosed4Questions();
                updateMainButton();
            } 
            // Agar 1-32 to'lgan bo'lsa, 33-35 ni tekshiramiz
            else if (nextEmpty4 === -1) {
                const nextEmpty6 = raschClosed6Answers.findIndex(ans => !ans);
                if (nextEmpty6 !== -1 && validClosed6.includes(key)) {
                    raschClosed6Answers[nextEmpty6] = key;
                    handled = true;
                    selectionHaptic();
                    renderRaschClosed6Questions();
                    updateMainButton();
                }
            }

            if (handled) {
                e.preventDefault();
                // Oyna ichida avtomat skroll qilish
                const nextEmptyBtn = document.querySelector('.question-row button:not(.selected)');
                if (nextEmptyBtn) {
                    nextEmptyBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
            
            // Delete yoki Backspace bilan oxirgi kiritilgan yopiq javobni o'chirish
            if (key === 'backspace' || key === 'delete') {
                const lastFilled6 = raschClosed6Answers.findLastIndex(a => a);
                if (lastFilled6 !== -1) {
                    raschClosed6Answers[lastFilled6] = '';
                    selectionHaptic();
                    renderRaschClosed6Questions();
                    updateMainButton();
                    e.preventDefault();
                } else {
                    const lastFilled4 = raschClosed4Answers.findLastIndex(a => a);
                    if (lastFilled4 !== -1) {
                        raschClosed4Answers[lastFilled4] = '';
                        selectionHaptic();
                        renderRaschClosed4Questions();
                        updateMainButton();
                        e.preventDefault();
                    }
                }
            }
        });

        // MathLive virtual klaviaturasini tashqariga bosib yopish (mobil)
        function hideMathKeyboard() {
            try {
                const vk = window.mathVirtualKeyboard;
                if (vk && vk.visible) vk.hide();
            } catch (e) {}
            const active = document.activeElement;
            if (active && active.tagName && active.tagName.toLowerCase() === 'math-field') {
                try { active.blur(); } catch (e) {}
            }
        }
        function tapIsOnMathKeyboard(ev) {
            const vk = window.mathVirtualKeyboard;
            if (vk && vk.boundingRect && vk.boundingRect.width > 0) {
                const r = vk.boundingRect;
                if (ev.clientX >= r.left - 4 && ev.clientX <= r.right + 4 &&
                    ev.clientY >= r.top - 4 && ev.clientY <= r.bottom + 4) {
                    return true;
                }
            }
            return !!(ev.target && ev.target.closest && ev.target.closest('.ML__keyboard'));
        }
        document.addEventListener('pointerdown', (ev) => {
            if (ev.target && ev.target.closest && ev.target.closest('math-field')) return;
            const vk = window.mathVirtualKeyboard;
            if (!vk || !vk.visible) return;
            if (tapIsOnMathKeyboard(ev)) return;
            hideMathKeyboard();
        });

        renderAll();
    </script>
</body>
</html>
